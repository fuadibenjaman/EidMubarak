<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Eid Mubarak</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="greeting-card">

    <h1 id="greet"></h1>

    <p class="subtitle">
      ....May this joyous day bring you lots of happiness.
      I pray for your well-being and success.
      May the Almighty accept your deeds and blessings in this holy month.
      Please remember me in your prayers as well. ✨....
    </p>

    <h3><i><b>Do you have anything to say for me?</b></i> 💌</h3>
    <textarea id="replyBox" placeholder="Write your reply..."></textarea>
    <br><br>
    <button id="sendBtn" onclick="sendReply()">Send Reply</button>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_KEY",
      authDomain: "eid-greeting-replies.firebaseapp.com",
      projectId: "eid-greeting-replies",
      storageBucket: "eid-greeting-replies.firebasestorage.app",
      messagingSenderId: "358904258015",
      appId: "1:358904258015:web:dbe27a24d6272a00c1b86a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.sendReply = async function () {
      const replyBox = document.getElementById("replyBox");
      const btn = document.getElementById("sendBtn");

      const reply = replyBox.value.trim();
      if (reply === "") return alert("Write something first!");

      btn.disabled = true;
      btn.innerText = "Sending...";

      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || localStorage.getItem("userName") || "anonymous";

      await addDoc(collection(db, "replies"), {
        name: name,
        message: reply,
        time: Date.now()
      });

      alert("Reply sent ❤️");
      replyBox.value = "";

      btn.disabled = false;
      btn.innerText = "Send Reply";
    }
  </script>

  <script src="script.js"></script>

</body>
</html>
