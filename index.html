<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Eid Greeting</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="card">
    <h1>🌙 Hellooo.....</h1>
    <p>Enter the name or nickname (eng) I usually call you.</p>

    <form id="nameForm" action="greeting.html" method="GET">
      <input type="text" id="nameInput" name="name" placeholder="Your Name..." required>
      <button type="submit">Enter✨</button>
    </form>

    <p id="lockMsg" style="font-size: 14px; opacity: 0.7;"></p>

  </div>

</div>

<script>
// 🔥 Version system (for reset)
const VERSION = "v2";
const STORAGE_KEY = "userName_" + VERSION;

const form = document.getElementById("nameForm");
const input = document.getElementById("nameInput");
const lockMsg = document.getElementById("lockMsg");

// 🔒 get saved name
let savedName = localStorage.getItem(STORAGE_KEY);

// যদি আগে নাম দেওয়া থাকে → lock করে দাও
if(savedName){
    input.value = savedName;
    input.disabled = true;
    lockMsg.innerText = "🔒 Name locked for this device";
}

// form submit
form.addEventListener("submit", function(e){
    let currentName = input.value.trim();

    if(savedName){
        // সবসময় আগের নামেই redirect
        e.preventDefault();
        window.location.href = "greeting.html?name=" + encodeURIComponent(savedName);
    } else {
        // প্রথমবার save
        localStorage.setItem(STORAGE_KEY, currentName);
    }
});
</script>

</body>
</html>
